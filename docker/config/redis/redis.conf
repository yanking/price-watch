# Redis 配置文件 - 开发环境

# 网络
bind 0.0.0.0
port 6379

# 通用
daemonize no
pidfile /var/run/redis/redis-server.pid
loglevel notice
logfile ""

# 快照（RDB 持久化）
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# AOF 持久化
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 内存
maxmemory 256mb
maxmemory-policy allkeys-lru

# 安全（开发环境可注释掉）
# requirepass your_password
